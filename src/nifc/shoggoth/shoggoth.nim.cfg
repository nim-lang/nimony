# The directory-wide src/nifc/nim.cfg turns on `-d:virtualParRi`, whose
# sealed scopes / elided closing parens make the tree optimizers fiddly to
# reason about (and were the source of the subtreeEqual overrun). This tool
# only reads `.x.nif` text and writes it back, so it has no need for the
# packed representation: undo the define for this compilation unit and work
# with explicit ParRi tokens throughout.
--undef:virtualParRi
